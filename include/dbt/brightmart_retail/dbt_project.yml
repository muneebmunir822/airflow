name: 'brightmart_retail_dw'
version: '1.0.0'
config-version: 2

profile: 'brightmart_retail_dw'

model-paths: ['models']
analysis-paths: ['analyses']
test-paths: ['tests']
seed-paths: ['seeds']
macro-paths: ['macros']
snapshot-paths: ['snapshots']

target-path: 'target'
clean-targets:
  - 'target'
  - 'dbt_packages'

models:
  brightmart_retail_dw:
    staging:
      +schema: staging
      +materialized: view
      +tags: ['staging']
    intermediate:
      +schema: intermediate
      +materialized: ephemeral
      +tags: ['intermediate']
    marts:
      dimensions:
        +schema: marts
        +materialized: table
        +tags: ['dimension']
      facts:
        +schema: marts
        +materialized: table
        +tags: ['fact']
      dq:
        +schema: dq
        +materialized: table
        +tags: ['data_quality']

seeds:
  brightmart_retail_dw:
    +schema: seeds
    +quote_columns: false

snapshots:
  brightmart_retail_dw:
    +target_schema: snapshots

# Store failing rows for learning. In production, decide this by environment.
data_tests:
  +store_failures: true
  +schema: test_failures
